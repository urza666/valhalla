# ═══════════════════════════════════════════════════════════
# Valhalla — Complete Self-Hosted Stack
# ═══════════════════════════════════════════════════════════
#
# Usage:
#   1. cp .env.example .env        (then edit .env)
#   2. docker compose up -d        (start everything)
#   3. Open http://localhost        (web client)
#
# Services:
#   web        — Nginx + React Frontend (port 80)
#   api        — Go API + WebSocket Gateway (port 8080)
#   postgres   — PostgreSQL 16 database
#   redis      — Redis 7 cache/sessions/pubsub
#   nats       — NATS message broker + JetStream
#   livekit    — LiveKit voice/video SFU (ports 7880-7882)
#   minio      — S3-compatible object storage (port 9000/9001)
#   meilisearch — Full-text search engine (port 7700)
#
# ═══════════════════════════════════════════════════════════

services:

  # ─── Web Client (Nginx + React SPA) ───────────────────────
  web:
    build:
      context: .
      dockerfile: deployments/Dockerfile.web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - valhalla

  # ─── API Server (Go + WebSocket Gateway) ──────────────────
  api:
    build:
      context: .
      dockerfile: deployments/Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    env_file: .env
    environment:
      # Override internal port to always be 8080 inside container
      API_PORT: "8080"
      API_HOST: "0.0.0.0"
      DATABASE_URL: "postgres://${DB_USER:-valhalla}:${DB_PASSWORD:-valhalla}@postgres:5432/${DB_NAME:-valhalla}?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-valhalla}@redis:6379/0"
      NATS_URL: "nats://nats:4222"
      LIVEKIT_HOST: "http://livekit:7880"
      STORAGE_ENDPOINT: "minio:9000"
      MEILI_URL: "http://meilisearch:7700"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    networks:
      - valhalla

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-valhalla}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-valhalla}
      POSTGRES_DB: ${DB_NAME:-valhalla}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-valhalla}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - valhalla

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-valhalla}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-valhalla}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - valhalla

  # ─── NATS + JetStream ────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    command: >
      --jetstream
      --store_dir /data
      --http_port 8222
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - valhalla

  # ─── LiveKit (Voice/Video SFU) ───────────────────────────
  livekit:
    image: livekit/livekit-server:v1.7
    ports:
      - "${LK_TCP_PORT:-7891}:7881"       # WebRTC TCP
      - "${LK_UDP_PORT:-7892}:7882/udp"   # WebRTC UDP
    command: >
      --dev
      --bind 0.0.0.0
      --port 7880
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret}"
    restart: unless-stopped
    networks:
      - valhalla

  # ─── MinIO (S3-compatible Object Storage) ─────────────────
  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - valhalla

  # MinIO init: create default bucket on first start
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set valhalla http://minio:9000 ${STORAGE_ACCESS_KEY:-minioadmin} ${STORAGE_SECRET_KEY:-minioadmin};
        mc mb valhalla/${STORAGE_BUCKET:-valhalla-assets} --ignore-existing;
        mc anonymous set download valhalla/${STORAGE_BUCKET:-valhalla-assets}/public;
        echo 'MinIO bucket ready.';
      "
    networks:
      - valhalla

  # ─── Meilisearch (Full-Text Search) ──────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILI_API_KEY:-valhalla-dev-key}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - valhalla

  # ─── Prometheus (Metrics Collection) ─────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./deployments/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=1GB'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - valhalla

  # ─── Grafana (Dashboards) ──────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - grafanadata:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-valhalla}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3083}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - valhalla

# ─── Volumes ──────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  natsdata:
    driver: local
  miniodata:
    driver: local
  meilidata:
    driver: local
  promdata:
    driver: local
  grafanadata:
    driver: local

# ─── Network ─────────────────────────────────────────────
networks:
  valhalla:
    driver: bridge
