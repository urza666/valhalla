global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'valhalla-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8080']
        labels:
          service: 'api'

  - job_name: 'nats'
    metrics_path: /varz
    static_configs:
      - targets: ['nats:8222']
        labels:
          service: 'nats'
