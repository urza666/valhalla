version: "3.9"

# Valhalla Production Self-Hosted Deployment
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # ─── Valhalla API + Gateway ───────────────────────────────
  valhalla:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-valhalla}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-valhalla}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-valhalla}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── NATS ─────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    command: "--jetstream --store_dir /data"
    volumes:
      - natsdata:/data
    restart: unless-stopped

  # ─── LiveKit ──────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7881:7881"     # WebRTC TCP
      - "7882:7882/udp" # WebRTC UDP
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?Set LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET:?Set LIVEKIT_API_SECRET}"
    restart: unless-stopped

  # ─── MinIO ────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:?Set STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:?Set STORAGE_SECRET_KEY}
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # ─── Meilisearch ──────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_API_KEY:?Set MEILI_API_KEY}
      MEILI_NO_ANALYTICS: true
    volumes:
      - meilidata:/meili_data
    restart: unless-stopped

  # ─── Caddy (Reverse Proxy + Auto-TLS) ────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - valhalla
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  natsdata:
  miniodata:
  meilidata:
  caddydata:
  caddyconfig:
