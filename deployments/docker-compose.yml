version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: valhalla
      POSTGRES_PASSWORD: valhalla
      POSTGRES_DB: valhalla
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valhalla"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring
    command: "--jetstream --store_dir /data"
    volumes:
      - natsdata:/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  meilisearch:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: valhalla-dev-key
    volumes:
      - meilidata:/meili_data

  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"   # HTTP + WebSocket
      - "7881:7881"   # WebRTC (TCP)
      - "7882:7882/udp" # WebRTC (UDP)
    command: >
      --dev
      --bind 0.0.0.0
      --port 7880
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"

volumes:
  pgdata:
  redisdata:
  natsdata:
  miniodata:
  meilidata:
